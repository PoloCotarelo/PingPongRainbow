<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PinPonRainbow - Motor de Visión Pro</title>
    <style>
        body { background: #121212; color: #00e676; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1b1b1b; width: 100%; padding: 15px; text-align: center; border-bottom: 2px solid #00e676; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #canvas-container { position: relative; margin: 20px; border: 3px solid #333; border-radius: 8px; overflow: hidden; line-height: 0; }
        canvas { background: #000; border: 3px solid #333; border-radius: 8px; }
        .panel-control { background: #1b1b1b; padding: 20px; border-radius: 8px; width: 800px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; border: 1px solid #333; margin-bottom: 30px;}
        select, button { background: #333; color: white; border: 1px solid #00e676; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; }
        
        /* Estilo para el botón de inicio */
        #startBtn {
            background: #00e676;
            color: #121212;
            font-weight: bold;
            font-size: 1.2em;
            padding: 15px;
            margin: 10px 0;
            transition: all 0.3s;
            border: none;
        }
        #startBtn:hover { background: #fff; transform: scale(1.02); }
        
        .telemetry-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sensor-card { background: #262626; padding: 8px; border-radius: 4px; font-size: 11px; border-left: 4px solid #444; }
        .detected { border-left-width: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .blur { filter: blur(10px) brightness(40%); transition: all 0.5s; }
        #highscore-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; z-index: 10; font-family: 'Segoe UI', sans-serif;
        }
        .table-ranking { background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #00e676; border-radius: 10px; box-shadow: 0 0 20px #00e676; min-width: 340px; height: 85%; display: flex; flex-direction: column; }
        .table-ranking h3 { margin-top: 0; text-align: center; color: #00e676; }
        .score-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 12px 0; font-size: 1.1em; }
        #nameInputContainer { margin-top: 15px; display: none; text-align: center; }
        .rank-0 { color: #FFD700; font-size: 1.8em; text-shadow: 0 0 15px #FFD700; font-weight: bold; }
        .rank-1 { color: #E0E0E0; font-size: 1.5em; text-shadow: 0 0 12px #E0E0E0; font-weight: bold; }
        .rank-2 { color: #CD7F32; font-size: 1.2em; text-shadow: 0 0 10px #CD7F32; font-weight: bold; }
        #nameInput { background: #121212; border: 1px solid #00e676; color: #fff; padding: 10px; border-radius: 5px; text-align: center; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="header">
    <h2>SISTEMA DE DETECCIÓN HUE-STABLE (HSV) - PinPonRainbow</h2>
    <div style="max-width: 400px; margin: 0 auto;">
        <select id="cameraSelect">Cargando cámaras...</select>
        <button id="startBtn">▶ INICIAR MÚSICA Y JUEGO</button>
    </div>
</div>

<div id="canvas-container">
    <canvas id="mainCanvas" width="640" height="480"></canvas>
    <div id="highscore-overlay">
        <div class="table-ranking">
            <h3>🏆 TOP 10 LEGENDS</h3>
            <div id="ranking-list"></div>
            <div id="nameInputContainer">
                <p>¡NUEVO RÉCORD!</p>
                <input type="text" id="nameInput" placeholder="TU NOMBRE" maxlength="15">
                <button id="saveNameBtn" style="margin-top:10px">GUARDAR</button>
            </div>
        </div>
    </div>
</div>

<div class="panel-control">
    <div>
        <h4>Configuración</h4>
        <label>Sensibilidad Hue (Tol):</label>
        <input type="range" id="hueTol" min="5" max="40" value="20" style="width:100%">
        <p style="font-size: 12px; color: #aaa;">Ajusta este valor si la raqueta no se detecta o hay falsos positivos.</p>
    </div>
    <div class="telemetry-grid" id="telemetry">
        </div>
</div>

<script>
/** * CONFIGURACIÓN */
const POS_H = [-180, 180]; 
const POS_V = [90, -15, -120]; 

const ESTILO = {
    opacidadVideo: 0.3,
    glowIntensidad: 25,
    rainbowRadio: 22,   
    lineaAncho: 3,
    miraGrosor: 6       
};

const OBJETIVOS_HSV = {
    "ROJO":     { h: 355, range: 15, hex: "#b03a53" },
    "VERDE":    { h: 110, range: 25, hex: "#5ca54d" },
    "AMARILLO": { h: 55,  range: 15, hex: "#c2b52c" },
    "AZUL":     { h: 200, range: 20, hex: "#0b8baf" }
};

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const video = document.createElement('video');
const telemetryContainer = document.getElementById('telemetry');
const hueTolInput = document.getElementById('hueTol');
const startBtn = document.getElementById('startBtn');

const OPCIONES_H = [-180, 180];
const OPCIONES_V = [90, -15, -120];
const NOMBRES_COLORES = ["ROJO", "VERDE", "AMARILLO", "AZUL"];

let acumuladorEnergia = 0;
let contadorEtiquetas = 0;
let umbralDeteccionBeat = 200; // Sensibilidad al bombo/bajo
let puedeCambiar = true;
let audioCtx;
let analyzer;
let source;
let dataArray;
let bufferLength;
const audio = new Audio('Baila%20Sin%20Parar.mp3');

let currentScratchX = 180; 
let currentScratchY = 90;
let ultimoColorDetectadoEnEsaZona = null;
let colorObjetivoActual = "ROJO"; 
let dificultad = 0;
let puntuacion = 0;
let objetivoConseguido = false;
let particulas = [];
let highscores = JSON.parse(localStorage.getItem('pinponScores')) || [];
let recordGuardadoEnEstaPartida = false;
    
function showHighscores() {
    const overlay = document.getElementById('highscore-overlay');
    const list = document.getElementById('ranking-list');
    const canvas = document.getElementById('mainCanvas');
    
    canvas.classList.add('blur');
    overlay.style.display = 'flex';
    list.innerHTML = highscores.map((s, i) => {
        const clasePodio = i < 3 ? `rank-${i}` : '';
        const colorPuntos = i < 3 ? 'inherit' : '#00e676';
        const colorTexto = i < 3 ? 'inherit' : '#00e676';
        return `
            <div class="score-row ${clasePodio}" style="color:${colorTexto}">
                <span>${i+1}. ${s.name}</span>
                <span style="color:${colorPuntos}">${s.score} pts</span>
            </div>`;
    }).join('');
    
    const isTop = highscores.length < 10 || puntuacion > highscores[highscores.length-1].score;
    if (isTop && !recordGuardadoEnEstaPartida) {
        document.getElementById('nameInputContainer').style.display = 'block';
    }
}

document.getElementById('saveNameBtn').onclick = () => {
    const name = document.getElementById('nameInput').value.trim() || "ANÓNIMO";
    if (name.toUpperCase() === "RESET") {
        highscores = [];
        localStorage.removeItem('pinponScores');
        recordGuardadoEnEstaPartida = true;
        document.getElementById('nameInputContainer').style.display = 'none';
        showHighscores();
        return;
    }
    highscores.push({ name, score: puntuacion });
    highscores.sort((a, b) => b.score - a.score);
    highscores = highscores.slice(0, 10);
    localStorage.setItem('pinponScores', JSON.stringify(highscores));
    document.getElementById('nameInputContainer').style.display = 'none';
    recordGuardadoEnEstaPartida = true;
    showHighscores();
};

audio.onended = () => {
    showHighscores();
    startBtn.style.display = "block";
    startBtn.innerText = "🔄 VOLVER A JUGAR";
};
    
class Particula {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 4 + 2;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.vida = 1.0; 
        this.gravedad = 0.2;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravedad;
        this.vida -= 0.02; 
    }

    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.vida;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 5;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function crearExplosion(x, y, color) {
    for (let i = 0; i < 15; i++) {
        particulas.push(new Particula(x, y, color));
    }
}

// 1. GESTIÓN DE CÁMARA E INICIO
async function init() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    videoDevices.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.text = d.label || `Cámara ${videoDevices.indexOf(d)+1}`;
        document.getElementById('cameraSelect').appendChild(opt);
    });
    startStream(videoDevices[0]?.deviceId);

    // LÓGICA DEL BOTÓN DE INICIO
    startBtn.onclick = () => {
        puntuacion = 0;
        dificultad = 0;
        contadorEtiquetas = 0;
        document.getElementById('mainCanvas').classList.remove('blur');
        document.getElementById('highscore-overlay').style.display = 'none';
        document.getElementById('nameInput').value = "";
        recordGuardadoEnEstaPartida = false;
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            analyzer.fftSize = 256;
            bufferLength = analyzer.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
        
        audio.play().then(() => {
            console.log("Audio iniciado");
            startBtn.style.display = "none"; // Ocultar botón tras iniciar
        }).catch(e => console.error("Error al reproducir:", e));
    };
}

async function startStream(id) {
    if (window.stream) window.stream.getTracks().forEach(t => t.stop());
    window.stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: id, width: 640, height: 480 } });
    video.srcObject = window.stream;
    video.play();
}

function rgbToHsv(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, v = max;
    const d = max - min;
    s = max === 0 ? 0 : d / max;
    if (max === min) h = 0;
    else {
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return { h: h * 360, s: s * 100, v: v * 100 };
}

function getSensorState(rgb) {
    const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
    const tolAdicional = parseInt(hueTolInput.value);
    if (hsv.s < 30 || hsv.v < 25) return { color: null, hsv };
    for (const [nombre, config] of Object.entries(OBJETIVOS_HSV)) {
        let diff = Math.abs(hsv.h - config.h);
        if (diff > 180) diff = 360 - diff;
        if (diff < (config.range + tolAdicional)) return { color: nombre, hsv };
    }
    return { color: null, hsv };
}

function cambiarObjetivoAleatorio() {
    currentScratchX = OPCIONES_H[Math.floor(Math.random() * OPCIONES_H.length)];
    currentScratchY = OPCIONES_V[Math.floor(Math.random() * OPCIONES_V.length)];
    colorObjetivoActual = NOMBRES_COLORES[Math.floor(Math.random() * NOMBRES_COLORES.length)];
    objetivoConseguido = false;
}

function loop() {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1); 
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let teleHtml = "";
    ultimoColorDetectadoEnEsaZona = null;
    const targetX = (currentScratchX + 240) * (640 / 480);
    const targetY = (180 - currentScratchY) * (480 / 360);

    POS_H.forEach(sh => {
        POS_V.forEach(sv => {
            const cx = (-sh + 240) * (640 / 480);
            const cy = (180 - sv) * (480 / 360);
            const size = 40;
            const imgData = ctx.getImageData(cx - size/2, cy - size/2, size, size).data;
            const avg = getAverageColor(imgData);
            const state = getSensorState(avg);

            if (sh === currentScratchX && sv === currentScratchY) {
                ultimoColorDetectadoEnEsaZona = state.color;
            }

            teleHtml += `
                <div class="sensor-card" style="${state.color ? 'border-left-color:'+OBJETIVOS_HSV[state.color].hex : ''}">
                    <b>ZONA ${sh},${sv}</b><br>
                    <span style="color:${state.color ? '#00ff00' : '#888'}">${state.color || '---'}</span>
                </div>`;
        });
    });

    let detectadoAhora = ultimoColorDetectadoEnEsaZona;
    if (detectadoAhora !== window.ultimoEstadoDeteccion) {
        if (detectadoAhora !== null && detectadoAhora === colorObjetivoActual && !objetivoConseguido) {
            objetivoConseguido = true;
            crearExplosion(targetX, targetY, OBJETIVOS_HSV[colorObjetivoActual].hex);
            puntuacion++;
        }
    }
    window.ultimoEstadoDeteccion = detectadoAhora;

    ctx.fillStyle = `rgba(18, 18, 18, ${1 - ESTILO.opacidadVideo})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    dibujarEscenarioFinal(targetX, targetY, ultimoColorDetectadoEnEsaZona);

    particulas.forEach((p, index) => {
        p.update();
        p.draw(ctx);
        if (p.vida <= 0) particulas.splice(index, 1);
    });

    ctx.restore(); 
    telemetryContainer.innerHTML = teleHtml;

    if (analyzer) {
        analyzer.getByteFrequencyData(dataArray);
        
        // Calculamos la energía de los bajos (primeras 10 bandas)
        let sum = 0;
        for (let i = 0; i < 10; i++) { sum += dataArray[i]; }
        let promedioBajos = sum / 10;

        // Si hay un pico de sonido (un "beat")
        if (promedioBajos > umbralDeteccionBeat && puedeCambiar) {
            contadorEtiquetas++;
            
            // Lógica solicitada:
            // Si el promedio es muy alto (>230), es una parte rápida: movemos cada 5 beats
            // Si es normal, movemos cada 10 beats
            dificultad = Math.min(puntuacion / 60, 1);
            let baseBeats = (promedioBajos > 230) ? 6 : 12;
            let limiteBeats = Math.max(baseBeats - Math.floor(puntuacion / 6), 2);

            if (contadorEtiquetas >= limiteBeats) {
                cambiarObjetivoAleatorio();
                contadorEtiquetas = 0;
            }

            // "Cooldown" para no contar el mismo beat múltiples veces por milisegundo
            puedeCambiar = false;
            setTimeout(() => { puedeCambiar = true; }, 150); 
        }
        
        dibujarAnalizadorAudio();
        ctx.save();
        ctx.font = "bold 28px 'Segoe UI'";
        ctx.fillStyle = obtenerColorLaser(dificultad);
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.fillStyle;
        ctx.textAlign = "right";
        ctx.fillText(`SCORE: ${puntuacion}`, canvas.width - 30, 45);
        ctx.restore();
        
    }
    
    requestAnimationFrame(loop);
}

function getAverageColor(pixels) {
    let r=0, g=0, b=0;
    for(let i=0; i<pixels.length; i+=4) { r+=pixels[i]; g+=pixels[i+1]; b+=pixels[i+2]; }
    const t = pixels.length/4;
    return { r: r/t, g: g/t, b: b/t };
}

function dibujarEscenarioFinal(targetX, targetY, detectado) {
    dibujarLineaNeon(targetX, 0, targetX, canvas.height, dificultad);
    dibujarLineaNeon(0, targetY, canvas.width, targetY, dificultad);
    dibujarMiraRainbow(targetX, targetY, detectado, colorObjetivoActual);
}

function obtenerColorLaser(progreso) {
    const r = Math.floor(0 + (255 - 0) * progreso);
    const g = Math.floor(230 + (0 - 230) * progreso);
    const b = Math.floor(118 + (0 - 118) * progreso);
    return `rgb(${r}, ${g}, ${b})`;
}

function dibujarLineaNeon(x1, y1, x2, y2, progresoDificultad) {
    const colorBase = obtenerColorLaser(progresoDificultad);
    const pulso = 0.85 + Math.sin(Date.now() / 50) * 0.15;
    ctx.save();
    ctx.shadowBlur = ESTILO.glowIntensidad * pulso;
    ctx.shadowColor = colorBase;
    ctx.strokeStyle = colorBase;
    ctx.lineWidth = ESTILO.lineaAncho;
    ctx.globalAlpha = pulso;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
}

function dibujarMiraRainbow(x, y, detectado, objetivo) {
    ctx.save();
    ctx.translate(x, y);
    const esCorrecto = (detectado === objetivo);
    const hayDeteccionErronea = (detectado !== null && !esCorrecto);
    const radioInterior = ESTILO.rainbowRadio - 8;
    const gradiente = ctx.createConicGradient(0, 0, 0);
    gradiente.addColorStop(0, "red"); gradiente.addColorStop(0.2, "yellow");
    gradiente.addColorStop(0.4, "green"); gradiente.addColorStop(0.6, "cyan");
    gradiente.addColorStop(0.8, "blue"); gradiente.addColorStop(1, "magenta");
    ctx.strokeStyle = gradiente;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, ESTILO.rainbowRadio, 0, Math.PI * 2);
    ctx.stroke();
    ctx.save();
    if (esCorrecto) {
        ctx.shadowBlur = ESTILO.glowIntensidad;
        ctx.shadowColor = "#FFD700";
        ctx.strokeStyle = "#FFD700";
        ctx.lineWidth = ESTILO.miraGrosor + 2;
    } else if (hayDeteccionErronea) {
        const parpadeo = Math.sin(Date.now() / 50) > 0;
        ctx.strokeStyle = parpadeo ? "#A020F0" : "#4B0082";
        ctx.lineWidth = ESTILO.miraGrosor;
    } else {
        ctx.strokeStyle = OBJETIVOS_HSV[objetivo].hex;
        ctx.lineWidth = ESTILO.miraGrosor;
    }
    ctx.beginPath();
    ctx.arc(0, 0, radioInterior, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    ctx.restore();
}

document.getElementById('cameraSelect').onchange = (e) => startStream(e.target.value);
init();
video.onplay = () => loop();

function dibujarAnalizadorAudio() {
    const anchoBarra = (canvas.width / 4) / bufferLength;
    let x = 0;
    ctx.save();
    ctx.translate(10, 10); 
    ctx.globalAlpha = 0.8;
    for (let i = 0; i < bufferLength; i++) {
        const alturaBarra = dataArray[i] / 2;
        ctx.fillStyle = `rgb(${dataArray[i] + 100}, 50, 255)`;
        ctx.fillRect(x, 50 - alturaBarra, anchoBarra, alturaBarra);
        x += anchoBarra + 1;
    }
    ctx.strokeStyle = "#00e676";
    ctx.strokeRect(-2, -52, (canvas.width / 4) + 5, 105);
    ctx.restore();
}
</script>
</body>
</html>
